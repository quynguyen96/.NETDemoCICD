# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true


jobs:
  ci:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.vars.outputs.tag }}
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
        
    - name: Restore dependencies
      run: dotnet restore DemoCICD.sln

    - name: Login Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Set tag
      id: vars
      run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

    - name: Build and push API Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./DemoCICD/Dockerfile
        push: true
        tags: quynguyen96/democicdapp:${{ steps.vars.outputs.tag }}
        
    - name: Build and push Worker Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./DemoCICDWorker/Dockerfile   # 👈 worker Dockerfile
        push: true
        tags: quynguyen96/democicdworker:${{ steps.vars.outputs.tag }}
  cd:
    runs-on: ubuntu-latest
    needs: ci
    steps:
      - name: Checkout CD repo
        uses: actions/checkout@v4
        with:
          repository: quynguyen96/.NETDemoCICD-cd
          token: ${{ secrets.GH_TOKEN }}
          path: cd-repo
      - name: Update image tag
        run: |
          cd cd-repo/deployment
          sed -i "s/tag:.*/tag: ${{ needs.ci.outputs.image_tag }}/" values-dev.yaml
      - name: Commit and push
        run: |
          cd cd-repo
          git config user.name "quynguyen96"
          git config user.email "quynguyen96.dev@gmail.com"
          git add .
          git commit -m "Update image tag to ${{ needs.ci.outputs.image_tag }}"
          git push
